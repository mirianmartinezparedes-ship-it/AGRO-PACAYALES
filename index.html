<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campo Camote 2025-2026</title>
<style>
:root{color-scheme:light}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4f0;color:#1a1a1a;min-height:100vh}
header{background:linear-gradient(135deg,#2e7d32,#1b5e20);color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;box-shadow:0 2px 8px rgba(0,0,0,.2)}
header h1{font-size:1.1rem;font-weight:700}
header p{font-size:.72rem;opacity:.75;margin-top:2px}
.tabs{display:flex;background:#fff;border-bottom:2px solid #c8e6c9;padding:0 16px;overflow-x:auto;gap:2px}
.tab-btn{padding:12px 16px;border:none;background:none;font-size:.82rem;font-weight:700;cursor:pointer;color:#888;border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all .15s}
.tab-btn:hover{color:#2e7d32}.tab-active{color:#2e7d32!important;border-bottom-color:#2e7d32!important}
.panel{display:none;padding:16px 20px;max-width:1280px;margin:0 auto}
.panel.active{display:block}
/* RESUMEN */
.res-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.rc{background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.07);padding:15px 17px;border-left:5px solid #ccc}
.rc.cp{border-left-color:#2e7d32}.rc.ca{border-left-color:#f9a825}
.rc-clickable{cursor:pointer;transition:box-shadow .15s,transform .15s}.rc-clickable:hover{box-shadow:0 4px 16px rgba(0,0,0,.15);transform:translateY(-1px)}
.rc-lote{font-size:.98rem;font-weight:800;color:#1b5e20}
.rc-meta{font-size:.7rem;color:#aaa;margin:4px 0 8px;display:flex;gap:8px;flex-wrap:wrap}
.rc-dates{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.rc-date{font-size:.68rem;background:#f5f5f5;border-radius:6px;padding:3px 8px;color:#555}
.rc-date span{font-weight:700;color:#1b5e20}
.rc-kpi{display:flex;justify-content:space-between;margin-bottom:5px}
.rc-lbl{font-size:.68rem;color:#999;text-transform:uppercase}
.rc-val{font-size:.88rem;font-weight:700}
.bar{height:9px;background:#eee;border-radius:6px;overflow:hidden;margin:7px 0 3px}
.bar-f{height:100%;border-radius:6px}
.pct-meta{display:flex;justify-content:space-between;font-size:.65rem;color:#bbb}
.badge-dds{display:inline-block;background:#e8f5e9;color:#2e7d32;font-size:.68rem;font-weight:700;padding:2px 9px;border-radius:20px;border:1px solid #a5d6a7;margin-bottom:8px}
.badge-nd{display:inline-block;background:#fff9c4;color:#f57f17;font-size:.68rem;font-weight:700;padding:2px 9px;border-radius:20px;border:1px solid #ffe082;margin-bottom:8px}
.dias-cosecha{font-size:.65rem;color:#888;margin-left:5px}
/* CALENDARIO */
.cal-layout{display:flex;gap:14px;align-items:flex-start}
.cal-side{width:215px;flex-shrink:0;background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);padding:14px;font-size:.78rem;position:sticky;top:10px}
.cal-side h3{font-size:.82rem;font-weight:800;color:#1b5e20;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid #c8e6c9}
.cal-main{flex:1;min-width:0}
.cal-toolbar{background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);padding:12px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.cal-toolbar label{font-size:.82rem;font-weight:700;color:#2e7d32}
select.sl{border:2px solid #4caf50;border-radius:8px;padding:6px 12px;font-size:.88rem;background:#f9fbe7;outline:none;cursor:pointer;min-width:200px}
.nav-btn{background:#e8f5e9;border:1.5px solid #a5d6a7;border-radius:7px;padding:5px 13px;font-size:.82rem;font-weight:700;cursor:pointer;color:#2e7d32}
.nav-btn:hover{background:#c8e6c9}
.mes-lbl{font-size:1rem;font-weight:800;color:#1b5e20;min-width:150px;text-align:center}
.leyenda-cal{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;align-items:center;background:#fff;padding:9px 12px;border-radius:10px;box-shadow:0 1px 5px rgba(0,0,0,.05)}
.ley{font-size:.63rem;font-weight:700;padding:2px 7px;border-radius:12px}
.cal-wrap{background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);overflow:hidden}
.cal-head{display:grid;grid-template-columns:repeat(7,1fr);background:#1b5e20}
.cal-head span{padding:8px 4px;text-align:center;font-size:.7rem;font-weight:700;color:#fff;text-transform:uppercase}
.cal-body{display:grid;grid-template-columns:repeat(7,1fr)}
.cd{min-height:110px;border-right:1px solid #efefef;border-bottom:1px solid #efefef;padding:5px 5px 5px 6px;background:#fff}
.cd:nth-child(7n){border-right:none}
.cd.vacio{background:#fafafa}.cd.hoy{background:#f1f8e9}
.cd.siembra-day{background:#f0fff4;border:3px solid #1b5e20!important;border-radius:0}
.cosecha-day{background:#fff8e1;border:3px solid #f57f17!important;border-radius:8px}
.siembra-tag{display:flex;align-items:center;gap:3px;font-size:.62rem;font-weight:800;color:#1b5e20;background:#c8e6c9;border-radius:5px;padding:2px 6px;margin-bottom:4px;width:fit-content}
.dn{font-size:.72rem;font-weight:800;color:#777;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center}
.dn.hoy-n{color:#2e7d32}.dn.pas{color:#ccc}
.chip{font-size:.62rem;padding:3px 6px;border-radius:5px;margin-bottom:3px;cursor:pointer;word-break:break-word;border-left:3px solid;display:block;transition:opacity .1s;font-weight:700;text-transform:uppercase;line-height:1.3}
.chip:hover{opacity:.75}
.sub-lbls{display:flex;flex-wrap:wrap;gap:2px;margin-top:2px}
.sub-lbl{font-size:.55rem;font-weight:400;text-transform:lowercase;background:rgba(0,0,0,.06);border-radius:3px;padding:1px 4px;color:inherit;opacity:.85}
/* PPTO chips — plomo */
.c-app,.c-fert,.c-guano,.c-otros{background:#ebebeb;color:#555;border-color:#aaa}
/* REAL chips — verde claro */
.chip-real{font-size:.60rem;padding:2px 5px;border-radius:4px;margin-bottom:2px;cursor:pointer;word-break:break-word;border-left:3px solid #66bb6a;display:block;background:#e8f5e9;color:#2e7d32;line-height:1.3;transition:opacity .1s}
.chip-real:hover{opacity:.75}
.chip-mo{font-size:.60rem;padding:2px 5px;border-radius:4px;margin-bottom:2px;cursor:pointer;word-break:break-word;border-left:3px solid #66bb6a;display:block;background:#e8f5e9;color:#2e7d32;line-height:1.3;transition:opacity .1s}
.chip-mo:hover{opacity:.75}
.chip-maq{font-size:.60rem;padding:2px 5px;border-radius:4px;margin-bottom:2px;cursor:pointer;word-break:break-word;border-left:3px solid #66bb6a;display:block;background:#e8f5e9;color:#2e7d32;line-height:1.3;transition:opacity .1s}
.chip-maq:hover{opacity:.75}
.sep-line{border-top:1px solid #e0e0e0;margin:3px 0}
.si-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f0f0f0;gap:6px}
.si-lbl{color:#999;font-size:.68rem;flex-shrink:0}
.si-val{font-weight:700;font-size:.72rem;text-align:right}
.si-lote{font-weight:800;color:#1b5e20;font-size:.8rem;margin-bottom:8px;word-break:break-word}
.si-cosecha{margin-top:10px;background:#fff8e1;border-radius:8px;padding:7px 9px;border-left:3px solid #ffb300}
.si-cosecha-lbl{font-size:.62rem;color:#888;text-transform:uppercase;font-weight:700}
.si-cosecha-val{font-size:.75rem;font-weight:800;color:#e65100;margin-top:2px}
.si-cosecha-dias{font-size:.65rem;color:#aaa;margin-top:2px}
.si-empty{color:#bbb;font-size:.72rem;text-align:center;margin-top:20px}
.si-bar{height:6px;background:#eee;border-radius:3px;overflow:hidden;margin-top:4px}
.si-bar-f{height:100%;border-radius:3px}
/* tooltip */
.tip{position:fixed;background:#1a1a1a;color:#fff;padding:12px 15px;border-radius:11px;font-size:.74rem;max-width:300px;z-index:9999;pointer-events:none;display:none;line-height:1.7;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.tip-title{font-weight:800;font-size:.82rem;margin-bottom:5px}
.tip-cat{opacity:.6;font-size:.67rem;margin-bottom:7px;text-transform:uppercase}
.tip-section{font-weight:700;font-size:.68rem;margin:6px 0 2px;opacity:.8;text-transform:uppercase;border-top:1px solid rgba(255,255,255,.15);padding-top:5px}
.tip-item{margin-bottom:2px;font-size:.72rem}
.tip-cost{margin-top:8px;font-weight:700;color:#a5d6a7}
/* STATUS DOT on chip */
.chip-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-left:4px;vertical-align:middle;flex-shrink:0}
.dot-ok{background:#43a047}.dot-par{background:#fb8c00}.dot-no{background:#e53935}
/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:10000;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:16px;padding:22px 24px;width:520px;max-width:96vw;box-shadow:0 8px 40px rgba(0,0,0,.25);font-size:.82rem}
.modal h3{font-size:.95rem;font-weight:800;color:#1b5e20;margin-bottom:4px}
.modal-meta{font-size:.7rem;color:#aaa;margin-bottom:14px}
.modal-detail{background:#f5f5f5;border-radius:8px;padding:10px 12px;margin-bottom:14px;font-size:.74rem;line-height:1.7;max-height:280px;overflow-y:auto}
.modal-detail .ms{font-weight:700;font-size:.68rem;text-transform:uppercase;color:#888;margin-top:6px}
.modal-detail .mi{margin-bottom:1px}
.status-row{display:flex;gap:8px;margin-bottom:12px}
.status-btn{flex:1;padding:8px 4px;border:2px solid #eee;border-radius:10px;background:#fff;cursor:pointer;font-size:.78rem;font-weight:700;text-align:center;transition:all .15s}
.status-btn:hover{opacity:.8}
.status-btn.sel-ok{border-color:#43a047;background:#e8f5e9;color:#1b5e20}
.status-btn.sel-par{border-color:#fb8c00;background:#fff3e0;color:#e65100}
.status-btn.sel-no{border-color:#e53935;background:#ffebee;color:#c62828}
.modal textarea{width:100%;border:1.5px solid #ddd;border-radius:8px;padding:8px 10px;font-size:.8rem;font-family:inherit;resize:vertical;min-height:60px;outline:none;margin-bottom:12px}
.modal textarea:focus{border-color:#4caf50}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.mbtn{padding:7px 16px;border-radius:8px;border:none;font-size:.8rem;font-weight:700;cursor:pointer}
.mbtn-cancel{background:#f5f5f5;color:#555}
.mbtn-save{background:#2e7d32;color:#fff}
.mbtn-clear{background:#ffebee;color:#c62828}
/* COMMENT LOG */
.clog{margin-top:14px;border-top:2px solid #e8f5e9;padding-top:10px}
.clog-title{font-size:.72rem;font-weight:800;color:#1b5e20;margin-bottom:8px;display:flex;align-items:center;gap:5px;cursor:pointer}
.clog-title:hover{color:#2e7d32}
/* BITACORA FULL MODAL */
#bitlog-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:3000;align-items:center;justify-content:center}
#bitlog-panel{background:#fff;border-radius:16px;width:min(700px,95vw);max-height:85vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.25)}
#bitlog-head{background:#1b5e20;color:#fff;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
#bitlog-body{overflow-y:auto;padding:16px 20px;flex:1}
.bitlog-row{border-left:4px solid #ccc;padding:9px 12px;margin-bottom:10px;border-radius:0 8px 8px 0;background:#fafafa}
.bitlog-row.ok{border-left-color:#43a047;background:#f1f8f1}
.bitlog-row.par{border-left-color:#fb8c00;background:#fff8f0}
.bitlog-row.no{border-left-color:#e53935;background:#fff5f5}
.bitlog-row.note{border-left-color:#42a5f5;background:#f0f7ff}
.bitlog-lote{font-size:.7rem;font-weight:800;color:#1b5e20}
.bitlog-fecha{font-size:.68rem;color:#888;margin-left:8px}
.bitlog-tipo{font-size:.62rem;color:#aaa;text-transform:uppercase;margin:2px 0}
.bitlog-note{font-size:.78rem;color:#222;margin-top:4px;line-height:1.5}
.clog-entry{background:#f9f9f9;border-radius:8px;padding:7px 9px;margin-bottom:6px;border-left:3px solid #ccc;font-size:.68rem}
.clog-entry.ok{border-left-color:#43a047}.clog-entry.par{border-left-color:#fb8c00}.clog-entry.no{border-left-color:#e53935}.clog-entry.note{border-left-color:#42a5f5}
.clog-date{font-weight:800;color:#555;margin-bottom:3px;font-size:.65rem}
.clog-cat{font-size:.6rem;color:#aaa;text-transform:uppercase;margin-bottom:3px}
.clog-st{font-size:.65rem;font-weight:700;margin-bottom:2px}
.clog-note{color:#333;line-height:1.5}
/* STOCK */
.stk-table{width:100%;border-collapse:collapse;font-size:.78rem}
.stk-table th{text-align:left;padding:7px 10px;font-size:.68rem;color:#888;font-weight:700;border-bottom:2px solid #eee;background:#f9f9f9}
.stk-table th.c{text-align:center}
.stk-table td{padding:7px 10px;border-bottom:1px solid #f5f5f5}
.stk-table td.c{text-align:center}
.stk-table tr:hover td{background:#fafafa}
/* TOTALES */
.tot-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:20px}
.tot-card{background:#fff;border-radius:14px;box-shadow:0 2px 10px rgba(0,0,0,.07);padding:18px 20px;border-top:5px solid}
.tot-card.cp{border-top-color:#2e7d32}
.tot-card.ca-g{border-top-color:#f9a825}
.tot-card.ca-s{border-top-color:#42a5f5}
.tot-card h3{font-size:.9rem;font-weight:800;margin-bottom:12px}
.tot-ha{font-size:2rem;font-weight:800;margin-bottom:4px}
.tot-sub{font-size:.72rem;color:#999}
.tot-lotes{margin-top:12px;display:flex;flex-wrap:wrap;gap:4px}
.tot-lote-tag{font-size:.62rem;background:#f0f0f0;border-radius:5px;padding:2px 7px;color:#555}
.tot-banner{background:linear-gradient(135deg,#1b5e20,#2e7d32);color:#fff;border-radius:16px;padding:28px 32px;display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;box-shadow:0 4px 16px rgba(46,125,50,.35)}
.tot-banner-ha{font-size:4rem;font-weight:900;line-height:1;letter-spacing:-2px}
.tot-subtot{background:#fff;border-radius:12px;padding:16px 20px;box-shadow:0 2px 8px rgba(0,0,0,.07);border-left:5px solid}
</style>
</head>
<body>
<header>
  <div><h1>🌱 Campo Camote 2025-2026</h1><p>Totales · Resumen · Calendario · Stock del Mes</p></div>
  <div style="font-size:.72rem;opacity:.8" id="hdr-fecha"></div>
</header>
<div class="tabs">
  <button class="tab-btn tab-active" id="btn-tot" onclick="showTab('tot')">📈 Totales</button>
  <button class="tab-btn" id="btn-res" onclick="showTab('res')">📊 Resumen</button>
  <button class="tab-btn" id="btn-cal" onclick="showTab('cal')">📅 Calendario</button>
  <button class="tab-btn" id="btn-stk" onclick="showTab('stk')">📦 Stock del Mes</button>
</div>
<div id="panel-tot" class="panel active"></div>
<div id="panel-res" class="panel"></div>
<div id="panel-cal" class="panel"></div>
<div id="panel-stk" class="panel"></div>
<div class="tip" id="tip"></div>
<div class="modal-bg" id="modal-bg" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3 id="m-title"></h3>
    <div class="modal-meta" id="m-meta"></div>
    <div class="modal-detail" id="m-detail"></div>
    <div style="font-size:.75rem;font-weight:700;color:#555;margin-bottom:8px">Estado:</div>
    <div class="status-row">
      <button class="status-btn" id="s-ok" onclick="selStatus('ok')">✅ Hecho</button>
      <button class="status-btn" id="s-par" onclick="selStatus('par')">⚠️ Parcial</button>
      <button class="status-btn" id="s-no" onclick="selStatus('no')">❌ No hecho</button>
    </div>
    <textarea id="m-note" placeholder="Comentario / nueva fecha programada…"></textarea>
    <div class="modal-btns">
      <button class="mbtn mbtn-clear" onclick="clearStatus()">Borrar</button>
      <button class="mbtn mbtn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="mbtn mbtn-save" onclick="saveStatus()">Guardar</button>
    </div>
  </div>
</div>

function showTab(t){
  TABS.forEach(x=>{
    document.getElementById('btn-'+x).classList.toggle('tab-active',x===t);
    document.getElementById('panel-'+x).classList.toggle('active',x===t);
  });
  if(t==='res'&&!document.getElementById('res-ready'))buildResumen();
  if(t==='cal'&&!document.getElementById('cal-sel'))buildCalUI();
  if(t==='stk'&&!document.getElementById('stk-mes-sel'))buildStock();
}
function goToCalendar(lote){
  // Build calendar UI if not yet built
  if(!document.getElementById('cal-sel'))buildCalUI();
  // Set lote and reset to current month
  calLote=lote;
  const hoy=new Date();calMes=hoy.getMonth();calAnio=hoy.getFullYear();
  // Update the select dropdown to match
  const sel=document.getElementById('cal-sel');
  if(sel)sel.value=lote;
  // Switch tab, update sidebar and draw
  showTab('cal');
  updateSidebar();
  drawCal();
}
function ddsHoy(s){if(!s)return null;const h=new Date(),d=new Date(s);return Math.round((Date.UTC(h.getFullYear(),h.getMonth(),h.getDate())-Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()))/86400000);}
function fmtD(iso,short){if(!iso)return '—';const o=short?{day:'2-digit',month:'short'}:{day:'2-digit',month:'short',year:'numeric'};return new Date(iso).toLocaleDateString('es-PE',o);}
function diasC(iso){if(!iso)return null;const h=new Date(),c=new Date(iso);return Math.round((Date.UTC(c.getFullYear(),c.getMonth(),c.getDate())-Date.UTC(h.getFullYear(),h.getMonth(),h.getDate()))/86400000);}

function scKey(cat){const c=(cat||'').toUpperCase();if(c.includes('FITOSANIT')||c.includes('CONTROL')||c.includes('AGROQUIM')||c.includes('FUMIG')||c.includes('MOCHILA')||c.includes('INSECTICIDA')||c.includes('FUNGICIDA')||c.includes('HERBICIDA')||c.includes('FOLIAR'))return 'app';if(c.includes('FERTILIZ')||c.includes('FERTIRRIEGO'))return 'fert';if(c.includes('GUANO')||c.includes('INSUMO'))return 'guano';return 'otros';}

function buildTotales(){
  const lotes=DATA.resumen;
  const grupos={
    'CP_GRAVEDAD':{lbl:'Camote Pintura',sublbl:'Gravedad',cls:'cp',items:[],haT:0,costoT:0,pptoT:0},
    'CA_GRAVEDAD':{lbl:'Camote Amarillo',sublbl:'Gravedad',cls:'ca-g',items:[],haT:0,costoT:0,pptoT:0},
    'CA_SISTEMA': {lbl:'Camote Amarillo',sublbl:'Sistema',cls:'ca-s',items:[],haT:0,costoT:0,pptoT:0}
  };
  let haTotal=0,costoTotal=0,pptoTotal=0,nLotes=0;
  lotes.forEach(l=>{
    const g=grupos[l.pk];if(!g)return;
    g.items.push(l);g.haT+=l.ha;
    g.costoT+=l.costo_ha*l.ha;g.pptoT+=l.ppto_ha*l.ha;
    haTotal+=l.ha;costoTotal+=l.costo_ha*l.ha;pptoTotal+=l.ppto_ha*l.ha;nLotes++;
  });
  const haCA=grupos['CA_GRAVEDAD'].haT+grupos['CA_SISTEMA'].haT;
  const haCP=grupos['CP_GRAVEDAD'].haT;
  const COL={cp:'#2e7d32','ca-g':'#f9a825','ca-s':'#42a5f5'};
  let h='<div style="max-width:960px"><h2 style="font-size:1rem;font-weight:800;color:#1b5e20;margin-bottom:16px">📈 Total de Hectáreas por Categoría</h2>';
  // BIG BANNER at top
  h+='<div class="tot-banner">'
    +'<div><div style="font-size:.95rem;font-weight:700;opacity:.85">TOTAL GENERAL — '+nLotes+' lotes activos</div>'
    +'<div style="font-size:.8rem;opacity:.6;margin-top:6px">'+haCA.toFixed(2)+' ha Amarillo  ·  '+haCP.toFixed(2)+' ha Pintura</div>'
    +'<div style="font-size:.75rem;opacity:.55;margin-top:4px">'+Fmt(costoTotal)+' real  ·  '+Fmt(pptoTotal)+' ppto</div></div>'
    +'<div style="text-align:right"><div class="tot-banner-ha">'+haTotal.toFixed(2)+'</div>'
    +'<div style="font-size:1.1rem;font-weight:700;opacity:.8;margin-top:-4px">hectáreas</div></div>'
    +'</div>';
  // Sub-totals Amarillo vs Pintura
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px">'
    +'<div class="tot-subtot" style="border-left-color:#f9a825">'
    +'<div style="font-size:.72rem;color:#999;margin-bottom:4px">CAMOTE AMARILLO TOTAL</div>'
    +'<div style="font-size:2rem;font-weight:800;color:#f9a825">'+haCA.toFixed(2)+' ha</div>'
    +'<div style="font-size:.7rem;color:#bbb">'+(grupos['CA_GRAVEDAD'].items.length+grupos['CA_SISTEMA'].items.length)+' lotes · Gravedad + Sistema</div>'
    +'</div>'
    +'<div class="tot-subtot" style="border-left-color:#2e7d32">'
    +'<div style="font-size:.72rem;color:#999;margin-bottom:4px">CAMOTE PINTURA TOTAL</div>'
    +'<div style="font-size:2rem;font-weight:800;color:#2e7d32">'+haCP.toFixed(2)+' ha</div>'
    +'<div style="font-size:.7rem;color:#bbb">'+grupos['CP_GRAVEDAD'].items.length+' lotes</div>'
    +'</div></div>';
  // Cards by category
  h+='<div class="tot-grid">';
  Object.values(grupos).forEach(g=>{
    if(!g.items.length)return;
    const pct=g.pptoT>0?Math.min(g.costoT/g.pptoT*100,100):0;
    const bc=pct>=100?'#e53935':pct>=80?'#ff9800':'#4caf50';
    h+='<div class="tot-card '+g.cls+'">'
      +'<h3 style="color:'+COL[g.cls]+'">🌿 '+g.lbl+' <span style="font-weight:400;font-size:.72rem;color:#aaa">· '+g.sublbl+'</span></h3>'

      +'<div class="tot-sub">'+g.items.length+' lote'+(g.items.length>1?'s':'')+'</div>'
      +'<div style="margin-top:10px;font-size:.72rem;display:flex;justify-content:space-between"><span style="color:#999">Real total</span><span style="font-weight:700">'+Fmt(g.costoT)+'</span></div>'
      +'<div style="font-size:.72rem;display:flex;justify-content:space-between"><span style="color:#999">Ppto total</span><span style="font-weight:700;color:#888">'+Fmt(g.pptoT)+'</span></div>'

/* ── TAB 1: RESUMEN ── */
function buildResumen(){
  const hoy=new Date();
  document.getElementById('hdr-fecha').textContent=hoy.toLocaleDateString('es-PE',{day:'2-digit',month:'short',year:'numeric'});
  const lotes=DATA.resumen.slice().sort((a,b)=>{if(!a.siembra&&!b.siembra)return 0;if(!a.siembra)return 1;if(!b.siembra)return -1;return b.siembra.localeCompare(a.siembra);});
  let h='<div class="res-grid">';
  lotes.forEach(l=>{
    const isCP=l.cultivo.includes('PINTURA'),pct=l.pct||0,bc=pct>=100?'#e53935':pct>=80?'#ff9800':'#4caf50',bw=Math.min(pct,100);
    const dd=ddsHoy(l.siembra),dpc=diasC(l.cosecha);
    h+='<div class="rc '+(isCP?'cp':'ca')+' rc-clickable" data-lote="'+l.lote+'">'
      +'<div class="rc-lote">'+l.lote+(l.fuente_costo==='calculado'?'<span style="font-size:.58rem;font-weight:600;background:#fff3e0;color:#e65100;border:1px solid #ffb74d;border-radius:4px;padding:1px 5px;margin-left:6px;vertical-align:middle">MO+VALES</span>':'')+'</div>'
      +'<div class="rc-meta"><span>'+(isCP?'🌱 C. Pintura':'🌿 C. Amarillo')+'</span>'+(l.variedad?'<span>🌾 '+l.variedad+'</span>':'')+'<span>📐 '+l.ha.toFixed(2)+' ha</span>'+(l.tipo?'<span>💧 '+l.tipo+'</span>':'')+'</div>'
      +(dd!==null?'<span class="badge-dds">Día '+dd+' DDS</span>':'<span class="badge-nd">Sin siembra</span>')
      +'<div class="rc-dates"><div class="rc-date">🌱 Siembra: <span>'+fmtD(l.siembra)+'</span></div>'
      +'<div class="rc-date">🏆 Cosecha: <span>'+fmtD(l.cosecha)+'</span>'+(dpc!==null?'<span class="dias-cosecha">'+(dpc>0?'en '+dpc+' días':'hace '+Math.abs(dpc)+' días')+'</span>':'')+'</div></div>'
      +'<div class="rc-kpi"><span class="rc-lbl">Real/ha</span><span class="rc-val" style="color:#1b5e20">'+Fmt(l.costo_ha)+'</span></div>'
      +'<div class="rc-kpi"><span class="rc-lbl">Presupuesto/ha</span><span class="rc-val" style="color:#666">'+Fmt(l.ppto_ha)+'</span></div>'
      +'<div class="rc-kpi"><span class="rc-lbl">Total lote</span><span class="rc-val">'+Fmt(l.costo_ha * l.ha)+'</span></div>'
      +'<div class="bar"><div class="bar-f" style="width:'+bw+'%;background:'+bc+'"></div></div>'
      +'<div class="pct-meta"><span>'+(l.pct!==null?pct.toFixed(1)+'% del ppto':'Sin ppto')+'</span>'+(pct>=80?'<span style="color:'+bc+';font-weight:700">'+(pct>=100?'⚠️ EXCEDIDO':'🔶 ALTO')+'</span>':'')+'</div></div>';
  });
  document.getElementById('panel-res').innerHTML=h+'</div><span id="res-ready" style="display:none"></span>';
  document.getElementById('panel-res').addEventListener('click',function(e){
    var card=e.target;
    while(card&&!card.classList.contains('rc-clickable'))card=card.parentElement;
    if(card&&card.dataset&&card.dataset.lote)openCostReport(card.dataset.lote);
  });
}

}

function drawCal(){
  const hoy=new Date(),ml=document.getElementById('mes-lbl');
  if(ml)ml.textContent=MESES[calMes]+' '+calAnio;
  const loteFil=calLote?DATA.resumen.filter(l=>l.lote===calLote):DATA.resumen;
  EVTS=[];
  const pplan={},preal={},pmo={},pmaq={};
  loteFil.forEach(l=>{
    if(!l.siembra)return;
    const siembra=new Date(l.siembra),sched=DATA.ppto[l.pk]||{};
    Object.keys(sched).forEach(ddsStr=>{
      const dds=parseInt(ddsStr),fechaEv=new Date(siembra.getTime()+dds*86400000);
      if(fechaEv.getFullYear()!==calAnio||fechaEv.getMonth()!==calMes)return;
      const dia=fechaEv.getDate();
      if(!pplan[dia])pplan[dia]={};if(!pplan[dia][l.lote])pplan[dia][l.lote]={};
      Object.keys(sched[ddsStr]).forEach(catLabel=>{
        const sc=scKey(catLabel);
        if(!pplan[dia][l.lote][sc])pplan[dia][l.lote][sc]={catLabels:new Set(),subs:[],cph:0,dds};
        const entry=pplan[dia][l.lote][sc];
        const catUp=catLabel.toUpperCase();
        const isSubLbl=!['CONTROL FITOSANITARIO','FERTILIZACIÓN','FERTILIZACION','FERTIRRIEGO','GUANO','INSUMOS'].includes(catUp);
        if(isSubLbl)entry.catLabels.add(catLabel);
        sched[ddsStr][catLabel].forEach(item=>{
          if(!entry.subs.find(x=>x.sub===item.sub&&x.catLabel===catLabel))entry.subs.push({sub:item.sub,catLabel,cph:item.cph||0,is_labor:item.is_labor||false});
          entry.cph+=item.cph||0;
        });
      });
    });
    // Real from VALES — group by superCategory per day+lote
    const vales=DATA.vales[l.lote]||{};
    Object.keys(vales).forEach(fIso=>{
      const f=new Date(fIso);
      if(f.getFullYear()!==calAnio||f.getMonth()!==calMes)return;
      const dia=f.getDate();
      if(!preal[dia])preal[dia]={};
      const grupoKey=l.lote;
      if(!preal[dia][grupoKey])preal[dia][grupoKey]={};
      vales[fIso].forEach(ev=>{
        const tipo=(ev.tipo||'').toUpperCase();
        let sc='otros';
        if(tipo==='AGROQUIMICO'||tipo==='AGROQUÍMICO')sc='app';
        else if(tipo==='FERTILIZANTE')sc='fert';
        else if(tipo==='INSUMO'||tipo==='GUANO')sc='guano';
        if(!preal[dia][grupoKey][sc])preal[dia][grupoKey][sc]={productos:[],lote:l.lote};
        const entry=preal[dia][grupoKey][sc];
        if(!entry.productos.find(x=>x.nombre===ev.nombre))
          entry.productos.push({nombre:ev.nombre,clase:ev.clase,cant_ha:ev.cant_ha,um:ev.um,ha:ev.ha,costo_xha:ev.costo_xha||0,precio_unit:ev.precio_unit||0,costo_total:ev.costo_total||0,cilindros:ev.cilindros||0,cil_ha:ev.cil_ha||0});
      });
    });
    // MANO DE OBRA real per lote/day
    const mo=DATA.mano_obra&&DATA.mano_obra[l.lote]||{};
    Object.keys(mo).forEach(fIso=>{
      const f=new Date(fIso);
      if(f.getFullYear()!==calAnio||f.getMonth()!==calMes)return;
      const dia=f.getDate();
      if(!pmo[dia])pmo[dia]={};
      if(!pmo[dia][l.lote])pmo[dia][l.lote]=[];
      mo[fIso].forEach(entry=>{pmo[dia][l.lote].push({cat:entry.cat,subs:entry.subs,costo:entry.costo,ha:l.ha||1,lote:l.lote,fecha:fIso});});
    });
    // TRABAJOS MAQUINARIA (tractor externo) per lote/day
    const maq=DATA.maquinaria&&DATA.maquinaria[l.lote]||{};
    Object.keys(maq).forEach(fIso=>{
      const f=new Date(fIso);
      if(f.getFullYear()!==calAnio||f.getMonth()!==calMes)return;
      const dia=f.getDate();
      if(!pmaq[dia])pmaq[dia]={};
      if(!pmaq[dia][l.lote])pmaq[dia][l.lote]=[];
      maq[fIso].forEach(entry=>{pmaq[dia][l.lote].push({actividad:entry.actividad,subs:entry.subs||[],costo_total:entry.costo_total||0,ha:entry.ha||l.ha||1,lote:l.lote,fecha:fIso});});
    });
  });
  const pplanEvts={};
  Object.keys(pplan).forEach(dia=>{
    pplanEvts[dia]=[];
    Object.keys(pplan[dia]).forEach(lote=>{
      Object.keys(pplan[dia][lote]).forEach(sc=>{
        const entry=pplan[dia][lote][sc],idx=EVTS.length;
        EVTS.push({tipo:'ppto',lote,sc,catLabels:[...entry.catLabels],subs:entry.subs,cph:entry.cph,dds:entry.dds});
        pplanEvts[dia].push({sc,lote,idx});
      });
    });
  });
  // Convert preal grouped structure to EVTS
  const prealEvts={};
  Object.keys(preal).forEach(dia=>{
    prealEvts[dia]=[];
    const diaStr=String(calAnio)+'-'+String(calMes+1).padStart(2,'0')+'-'+String(dia).padStart(2,'0');
    Object.keys(preal[dia]).forEach(lote=>{
      Object.keys(preal[dia][lote]).forEach(sc=>{
        const entry=preal[dia][lote][sc],idx=EVTS.length;
        const costoTotal=entry.productos.reduce((s,p)=>s+(p.costo_xha||0),0);
        EVTS.push({tipo:'real',lote,sc,productos:entry.productos,costoTotal,fecha:diaStr});
        prealEvts[dia].push(idx);
      });
    });
  });
  // Convert pmo (mano de obra) to EVTS
  const pmoEvts={};
  Object.keys(pmo).forEach(dia=>{
    pmoEvts[dia]=[];
    const diaStr=String(calAnio)+'-'+String(calMes+1).padStart(2,'0')+'-'+String(parseInt(dia)).padStart(2,'0');
    Object.keys(pmo[dia]).forEach(lote=>{
      // Group categories for this lote/day
      const catMap={};
      pmo[dia][lote].forEach(entry=>{
        const k=entry.cat;
        if(!catMap[k])catMap[k]={cat:entry.cat,subs:[],costo:0,ha:entry.ha||1,lote,fecha:diaStr};
        entry.subs.forEach(s=>{if(!catMap[k].subs.includes(s))catMap[k].subs.push(s);});
        catMap[k].costo+=entry.costo;
      });
      Object.values(catMap).forEach(grp=>{
        const idx=EVTS.length;
        EVTS.push({tipo:'mo',lote:grp.lote,cat:grp.cat,subs:grp.subs,costo:grp.costo,ha:grp.ha||1,fecha:diaStr});
        pmoEvts[dia].push(idx);
      });
    });
  })// Convert pmaq (maquinaria) to EVTS
  const pmaqEvts={};
  Object.keys(pmaq).forEach(dia=>{
    pmaqEvts[dia]=[];
    const diaStr=String(calAnio)+'-'+String(calMes+1).padStart(2,'0')+'-'+String(parseInt(dia)).padStart(2,'0');
    Object.keys(pmaq[dia]).forEach(lote=>{
      const actMap={};
      pmaq[dia][lote].forEach(entry=>{
        const k=entry.actividad;
        if(!actMap[k])actMap[k]={actividad:entry.actividad,subs:[],costo_total:0,ha:entry.ha||1,lote,fecha:diaStr};
        entry.subs.forEach(s=>{if(!actMap[k].subs.includes(s))actMap[k].subs.push(s);});
        actMap[k].costo_total+=entry.costo_total;
      });
      Object.values(actMap).forEach(grp=>{
        const idx=EVTS.length;
        EVTS.push({tipo:'maq',lote:grp.lote,actividad:grp.actividad,subs:grp.subs,costo_total:grp.costo_total,ha:grp.ha||1,fecha:diaStr});
        pmaqEvts[dia].push(idx);
      });
    });
  });
  // Collect siembra and cosecha days this month
  const cosechasDia={};
  loteFil.forEach(l=>{
    if(!l.cosecha)return;
    const c=new Date(l.cosecha);
    if(c.getFullYear()===calAnio&&c.getMonth()===calMes){
      const d=c.getDate();
      if(!cosechasDia[d])cosechasDia[d]=[];
      cosechasDia[d].push(l.lote);
    }
  });
  // Collect siembra days this month
  const siebrasDia={};  // dia → [lote names]
  // Also build global date-key → lotes map for siembra modal
  if(!window.SIEMBRA_MAP)window.SIEMBRA_MAP={};
  loteFil.forEach(l=>{
    if(!l.siembra)return;
    const s=new Date(l.siembra);
    if(s.getFullYear()===calAnio&&s.getMonth()===calMes){
      const d=s.getDate();
      if(!siebrasDia[d])siebrasDia[d]=[];
      siebrasDia[d].push(l.lote);
      const sk=calAnio+'-'+String(calMes+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
      if(!SIEMBRA_MAP[sk])SIEMBRA_MAP[sk]=[];
      if(!SIEMBRA_MAP[sk].includes(l.lote))SIEMBRA_MAP[sk].push(l.lote);
    }
  });

  const primer=new Date(calAnio,calMes,1).getDay(),diasM=new Date(calAnio,calMes+1,0).getDate();
  let h='<div class="cal-wrap"><div class="cal-head">';
  DS.forEach(d=>h+='<span>'+d+'</span>');
  h+='</div><div class="cal-body">';
  for(let i=0;i<primer;i++)h+='<div class="cd vacio"></div>';
  for(let d=1;d<=diasM;d++){
    const esH=(d===hoy.getDate()&&calMes===hoy.getMonth()&&calAnio===hoy.getFullYear());
    const esPas=new Date(calAnio,calMes,d)<new Date(hoy.getFullYear(),hoy.getMonth(),hoy.getDate());
    const esSiembra=!!siebrasDia[d];const esCosecha=!!cosechasDia[d];
    // DDS badge for selected lote (UTC integers to avoid timezone drift)
    let ddsBadge='';
    if(calLote){
      const loteInfo=DATA.resumen.find(l=>l.lote===calLote);
      if(loteInfo&&loteInfo.siembra){
        const sp=loteInfo.siembra.split('-');
        const cellMs=Date.UTC(calAnio,calMes,d);
        const sMs=Date.UTC(+sp[0],+sp[1]-1,+sp[2]);
        const ddsVal=Math.round((cellMs-sMs)/86400000);
        if(ddsVal>=0){
          const ddsBg=esH?'#000':'#333';
          ddsBadge='<span style="font-size:.62rem;background:'+ddsBg+';color:#fff;padding:2px 6px;border-radius:5px;margin-left:5px;font-weight:900">D'+ddsVal+'</span>';
        }
      }
    }
    h+='<div class="cd'+(esH?' hoy':'')+(esSiembra?' siembra-day':'')+(esCosecha?' cosecha-day':'')+'"><div class="dn'+(esH?' hoy-n':'')+(esPas&&!esH?' pas':'')+'">'
      +d+(esH?'<span style="font-size:.52rem;background:#2e7d32;color:#fff;padding:1px 5px;border-radius:5px;margin-left:3px">HOY</span>':'')+ddsBadge+'</div>'
      +(esSiembra?'<div class="siembra-tag" style="cursor:pointer" onclick="showSiembraModal(event,'+calAnio+'-'+(calMes+1<10?'0':'')+(calMes+1)+'-'+(d<10?'0':'')+d+')">🤲🌱 '+(calLote?'SIEMBRA':'SIEMBRA: '+siebrasDia[d].map(l=>l.replace('_',' ').slice(0,10)).join(', '))+'</div>':'')
      +(esCosecha?'<div style="font-size:.6rem;font-weight:800;color:#e65100;background:#fff3e0;border-radius:5px;padding:2px 6px;margin-bottom:3px;width:fit-content">🏆 '+(calLote?'COSECHA':'COSECHA: '+cosechasDia[d].map(l=>l.slice(0,10)).join(', '))+'</div>':'');
    if(pplanEvts[d])pplanEvts[d].forEach(({sc,idx})=>{
      const ev=EVTS[idx];
      // Skip chips that have ONLY labor (no products) — nothing useful to show
      const hasProducts=ev.subs&&ev.subs.some(x=>!x.is_labor);
      if(!hasProducts)return;
      const S=SC_DEF[sc];
      const prefix=calLote?'':ev.lote.split('_')[0].slice(0,9)+' · ';
      h+='<div class="chip '+S.cls+'" onclick="showTip(event,'+idx+')" style="display:flex;align-items:center;gap:3px">'+S.ico+' '+prefix+S.label+chipDot(ev)+'</div>';
    });
    if(prealEvts[d]&&prealEvts[d].length){
      h+='<div class="sep-line"></div>';
      prealEvts[d].forEach(idx=>{
        const ev=EVTS[idx],S=SC_DEF[ev.sc]||SC_DEF['otros'];
        const prefix=calLote?'':ev.lote.split('_')[0].slice(0,9)+' · ';
        h+='<div class="chip-real" onclick="showTip(event,'+idx+')" style="display:flex;align-items:center;gap:3px">⬛ '+prefix+S.label+chipDot(ev)+'</div>';
      });
    }
    if(pmoEvts[d]&&pmoEvts[d].length){
      if(!prealEvts[d]||!prealEvts[d].length)h+='<div class="sep-line"></div>';
      pmoEvts[d].forEach(idx=>{
        const ev=EVTS[idx];
        const prefix=calLote?'':ev.lote.split('_')[0].slice(0,9)+' · ';
        const lbl=ev.cat.length>18?ev.cat.slice(0,17)+'…':ev.cat;
        h+='<div class="chip-mo" onclick="showTip(event,'+idx+')" style="display:flex;align-items:center;gap:3px">👷 '+prefix+lbl+chipDot(ev)+'</div>';
      });
    }
    if(pmaqEvts[d]&&pmaqEvts[d].length){
      h+='<div class="sep-line"></div>';
      pmaqEvts[d].forEach(idx=>{
        const ev=EVTS[idx];
        const prefix=calLote?'':ev.lote.split('_')[0].slice(0,9)+' · ';
        const lbl=ev.actividad.length>18?ev.actividad.slice(0,17)+'…':ev.actividad;
        h+='<div class="chip-maq" onclick="showTip(event,'+idx+')" style="display:flex;align-items:center;gap:3px">🚜 '+prefix+lbl+chipDot(ev)+'</div>';
      });
    }
    h+='</div>';
  }
  h+='</div></div>';
  document.getElementById('cal-cont').innerHTML=h;
}
/* ── STATUS (localStorage) ── */
const ST_KEY='agropac_status';
function loadStatus(){try{return JSON.parse(localStorage.getItem(ST_KEY)||'{}')}catch(e){return{}}}
function saveAllStatus(data){localStorage.setItem(ST_KEY,JSON.stringify(data))}
function statusKey(ev){
  if(ev.tipo==='real') return 'real|'+ev.lote+'|'+ev.fecha+'|'+ev.sc;
  if(ev.tipo==='mo') return 'mo|'+ev.lote+'|'+ev.fecha+'|'+ev.cat;
  if(ev.tipo==='maq') return 'maq|'+ev.lote+'|'+ev.fecha+'|'+ev.actividad;
  return 'ppto|'+ev.lote+'|'+ev.dds+'|'+ev.sc;
}
function getStatus(ev){return loadStatus()[statusKey(ev)]||null;}

let modalIdx=null,selSt=null;
function openModal(idx){
  const ev=EVTS[idx];
  modalIdx=idx;selSt=null;
  const saved=getStatus(ev);
  if(saved){selSt=saved.status;document.getElementById('m-note').value=saved.note||'';}
  else{document.getElementById('m-note').value='';}
  const S=SC_DEF[ev.sc]||SC_DEF['otros'];
  let det='';
  if(ev.tipo==='mo'){
    document.getElementById('m-title').textContent='👷 '+ev.cat+' — MANO DE OBRA';
    const fd=new Date(ev.fecha).toLocaleDateString('es-PE',{day:'2-digit',month:'long',year:'numeric'});
    document.getElementById('m-meta').textContent=ev.lote+' — '+fd;
    (ev.subs||[]).forEach(s=>{det+='<div class="mi">• '+s+'</div>';});
    if(ev.costo>0){
      const ha=ev.ha||1;
      const cph=ev.costo/ha;
      det+='<div style="margin-top:8px;font-weight:700;color:#37474f">'+Fmt(cph)+' <span style="font-weight:400;font-size:.68rem;color:#888">x ha</span></div>';
      det+='<div style="font-size:.68rem;color:#aaa">Total: '+Fmt(ev.costo)+' ('+ha.toFixed(2)+' ha)</div>';
    }
    document.getElementById('m-detail').innerHTML=det;
    ['ok','par','no'].forEach(s=>{const b=document.getElementById('s-'+s);b.className='status-btn'+(selSt===s?' sel-'+s:'');});
    document.getElementById('modal-bg').style.display='flex';return;
  }
  if(ev.tipo==='maq'){
    document.getElementById('m-title').textContent='🚜 '+ev.actividad+' — MAQUINARIA';
    const fd=new Date(ev.fecha).toLocaleDateString('es-PE',{day:'2-digit',month:'long',year:'numeric'});
    document.getElementById('m-meta').textContent=ev.lote+' — '+fd;
    (ev.subs||[]).forEach(s=>{det+='<div class="mi">• '+s+'</div>';});
    if(ev.costo_total>0){
      const ha=ev.ha||1;
      const cph=ev.costo_total/ha;
      det+='<div style="margin-top:8px;font-weight:700;color:#4e342e">'+Fmt(cph)+' <span style="font-weight:400;font-size:.68rem;color:#888">x ha</span></div>';
      det+='<div style="font-size:.68rem;color:#aaa">Total: '+Fmt(ev.costo_total)+' ('+ha.toFixed(2)+' ha)</div>';
    }
    document.getElementById('m-detail').innerHTML=det;
    ['ok','par','no'].forEach(s=>{const b=document.getElementById('s-'+s);b.className='status-btn'+(selSt===s?' sel-'+s:'');});
    document.getElementById('modal-bg').style.display='flex';return;
  }
  if(ev.tipo==='ppto'){
    document.getElementById('m-title').textContent=S.ico+' '+S.label+' — PRESUPUESTADO';

function importarBitacora(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const obj=JSON.parse(e.target.result);
      const comentarios=obj.comentarios||obj;  // support both formats
      const n=Object.keys(comentarios).length;
      if(confirm('¿Cargar '+n+' comentarios desde "'+file.name+'"?\n\nEsto reemplazará los comentarios actuales del navegador.')){
        saveAllStatus(comentarios);
        drawCal();
        if(calLote)updateSidebar();
        alert('✅ Bitácora cargada correctamente ('+n+' registros).');
      }
    }catch(err){alert('❌ Error al leer el archivo. Asegúrate de seleccionar un archivo de bitácora válido.');}
    input.value='';
  };
  reader.readAsText(file);
}

function buildCommentLog(lote){
  const all=loadStatus();
  const ST_LBL={ok:'✅ Hecho',par:'⚠️ Parcial',no:'❌ No hecho'};
  const ST_CLS={ok:'ok',par:'par',no:'no'};
  // Filter entries for this lote (handle both regular and siembra key formats)
  const entries=Object.entries(all)
    .filter(([k,v])=>{
      if(!(v.status||v.note))return false;
      const parts=k.split('|');
      const tipo=parts[0];
      if(tipo==='siembra') return parts[2]&&parts[2].split(',').includes(lote);
      return k.includes('|'+lote+'|')||k.endsWith('|'+lote);
    })
    .map(([k,v])=>{
      const parts=k.split('|');
      const tipo=parts[0],sc=parts[parts.length-1];
      // siembra key: siembra|FECHA|lotes — real/mo/maq/ppto: tipo|lote|fecha_or_dds|sc
      const fecha=tipo==='siembra'?parts[1]:parts[2];
      let dateStr='';
      if(tipo==='siembra'||tipo==='real'||tipo==='mo'||tipo==='maq'){
        const d=new Date(fecha+'T12:00:00');
        dateStr=isNaN(d)?fecha:d.toLocaleDateString('es-PE',{day:'2-digit',month:'long'});
      } else {
        dateStr='DDS '+fecha;
      }
      return {tipo,sc,fecha,dateStr,status:v.status,note:v.note,cls:ST_CLS[v.status]||'note'};
    })
    .sort((a,b)=>a.dateOrDds.localeCompare(b.dateOrDds));
  if(!entries.length)return '<div class="clog"><div class="clog-title" onclick="abrirBitacoraCompleta()" title="Ver todos los comentarios">📝 Bitácora <span style="margin-left:auto;font-size:.62rem;color:#81c784;font-weight:600">Ver todos →</span></div></div>';
  const S=SC_DEF;
  let h='<div class="clog"><div class="clog-title" onclick="abrirBitacoraCompleta()" title="Ver todos los comentarios">📝 Bitácora <span style="font-weight:400;font-size:.62rem;color:#aaa">('+entries.length+' en este lote)</span> <span style="margin-left:auto;font-size:.62rem;color:#81c784;font-weight:600">Ver todos →</span></div>';
  entries.forEach(e=>{
    const catLbl=(S[e.sc]||S['otros']).label;
    h+='<div class="clog-entry '+(e.cls)+'">'
      +'<div class="clog-date">'+e.dateStr+'</div>'
      +'<div class="clog-cat">'+(e.tipo==='real'?'⬛ Aplicado':e.tipo==='mo'?'👷 Mano de obra':e.tipo==='maq'?'🚜 Maquinaria':'📋 Presupuestado')+' · '+catLbl+'</div>'
      +(e.status?'<div class="clog-st">'+ST_LBL[e.status]+'</div>':'')
      +(e.note?'<div class="clog-note">'+e.note+'</div>':'')
      +'</div>';
  });
  h+='</div>';
  return h;
}

  const CAT_ORDER=['MAQUINARIA Y TRABAJOS','FERTILIZANTES','INSUMOS AGROQUÍMICOS','MANO DE OBRA','ARRIENDO Y AGUA','OTROS'];
  const realByCat={};
  CAT_ORDER.forEach(c=>{realByCat[c]=[];});

  function addRealRow(cat,actividad,desc,cant_ha,um,costo_xha,costo_total){
    if(!realByCat[cat])realByCat[cat]=[];
    // Merge same actividad+desc
    const ex=realByCat[cat].find(r=>r.actividad===actividad&&r.desc===desc);
    if(ex){ex.cant_ha+=cant_ha;ex.costo_xha+=costo_xha;ex.total+=costo_total;}
    else realByCat[cat].push({actividad,desc,cant_ha,um,costo_xha,total:costo_total});
  }

  // VALES
  Object.entries(DATA.vales[loteName]||{}).forEach(([dt,entries])=>{
    entries.forEach(e=>{
      const cat=e.tipo==='FERTILIZANTE'?'FERTILIZANTES':'INSUMOS AGROQUÍMICOS';
      addRealRow(cat,e.clase||e.tipo,e.nombre,e.cant_ha||0,e.um||'',e.costo_xha||0,e.costo_total||0);
    });
  });

  // MANO DE OBRA
  Object.entries(DATA.mano_obra[loteName]||{}).forEach(([dt,entries])=>{
    entries.forEach(e=>{
      const cph=(e.costo||0)/ha;
      addRealRow('MANO DE OBRA',e.cat,(e.subs||[]).join('; ')||e.cat,0,'',cph,e.costo||0);
    });
  });

  // MAQUINARIA
  Object.entries(DATA.maquinaria[loteName]||{}).forEach(([dt,entries])=>{
    entries.forEach(e=>{
      const total=e.costo_total||0, haE=e.ha||ha;
      const cat=['ARRIENDO','AGUA'].includes(e.actividad)?'ARRIENDO Y AGUA':'MAQUINARIA Y TRABAJOS';
      addRealRow(cat,e.actividad,(e.subs||[]).join('; ')||e.actividad,0,'',total/haE,total);
    });
  });

  // ── Total real ──
  let totalReal=0;
  CAT_ORDER.forEach(c=>{totalReal+=realByCat[c].reduce((s,r)=>s+r.total,0);});
  const totalRealHa=totalReal/ha;

  // ── PPTO total del lote ──
  const pptoHa=lote.ppto_ha||0, pptoTotal=pptoHa*ha;

  // ── PPTO por categoría ──
  const pptoByCat={};
  CAT_ORDER.forEach(c=>{pptoByCat[c]=0;});
  if(DATA.ppto[pk]){
    Object.values(DATA.ppto[pk]).forEach(cats=>{
      Object.entries(cats).forEach(([cat,items])=>{
        const cu=cat.toUpperCase();
        let dc;
        if(['FERTILIZANTE EDAFICO','FERTILIZANTE','FERTILIZANTES','ABONO'].includes(cu))dc='FERTILIZANTES';
        else if(['ARRIENDO'].some(x=>cu.includes(x))||cu==='AGUA')dc='ARRIENDO Y AGUA';
        else if(['MANO DE OBRA','FERTIRRIEGO','FERTILIZACION','DESHIERBO','RIEGO','APORQUE','CULTIVO','SIEMBRA','DESENTERRAR'].some(x=>cu.includes(x)))dc='MANO DE OBRA';
        else if(['MAQUINARIA','PREPARACION','TRABAJO CON','COSECHA','COSECHADORA'].some(x=>cu.includes(x)))dc='MAQUINARIA Y TRABAJOS';
        else if(['AGROQUIMICO','INSECTICIDA','HERBICIDA','FUNGICIDA','FOLIAR','FITOSANITARIO'].some(x=>cu.includes(x))||['Insecticida','Herbicida','Fungicida','foliar','FOLIAR'].includes(cat))dc='INSUMOS AGROQUÍMICOS';
        else dc='OTROS';
        if(!pptoByCat[dc])pptoByCat[dc]=0;
        items.forEach(item=>{pptoByCat[dc]+=(item.cph||0)*ha;});
      });
    });
  }

  // ── Construir HTML ──
  const siembraFmt=lote.siembra?new Date(lote.siembra+'T12:00:00').toLocaleDateString('es-PE',{day:'2-digit',month:'short',year:'numeric'}):'—';
  const cosechaFmt=lote.cosecha?new Date(lote.cosecha+'T12:00:00').toLocaleDateString('es-PE',{day:'2-digit',month:'short',year:'numeric'}):'—';
  const ddsHoy=lote.siembra?Math.floor((new Date()-new Date(lote.siembra+'T12:00:00'))/(864e5)):0;
  const pct=pptoTotal>0?Math.round(totalReal/pptoTotal*100):0;
  const pctColor=pct>100?'#c62828':pct>80?'#e65100':'#2e7d32';

  let h=``;

  // Tabla
  h+=`<table style="width:100%;border-collapse:collapse;font-size:.75rem">
    <thead>
      <tr style="background:#1b5e20;color:#fff">
        <th style="padding:8px 10px;text-align:left;border-radius:6px 0 0 0">CATEGORÍA</th>
        <th style="padding:8px 10px;text-align:left">DESCRIPCIÓN</th>
        <th style="padding:8px 6px;text-align:right">CANT./HA</th>
        <th style="padding:8px 6px;text-align:right">REAL / HA</th>
        <th style="padding:8px 6px;text-align:right">% GASTO</th>
        <th style="padding:8px 6px;text-align:right">PPTO / HA</th>
        <th style="padding:8px 6px;text-align:right;border-radius:0 6px 0 0">VARIACIÓN</th>
      </tr>
    </thead><tbody>`;

  let rowIdx=0;
  CAT_ORDER.forEach(cat=>{
    const rows=realByCat[cat];
    const pptoC=pptoByCat[cat]||0;
    const pptoC_ha=pptoC/ha;
    if(!rows.length&&pptoC===0)return;

    // Category header
    h+=`<tr style="background:#e8f5e9">
      <td colspan="5" style="padding:6px 10px;font-weight:800;color:#1b5e20;font-size:.72rem;border-top:2px solid #c8e6c9">${cat}</td>
      <td style="padding:6px 10px;text-align:right;font-weight:700;color:#555;border-top:2px solid #c8e6c9">${pptoC>0?Fv(pptoC_ha):''}</td>
      <td style="border-top:2px solid #c8e6c9"></td>
    </tr>`;

    // Data rows
    const catTotal=rows.reduce((s,r)=>s+r.total,0);
    rows.sort((a,b)=>b.total-a.total).forEach(r=>{
      const cph=r.costo_xha||r.total/ha;
      const pct_row=totalReal>0?(r.total/totalReal*100):0;
      const bg=rowIdx%2===0?'#fff':'#fafafa';
      h+=`<tr style="background:${bg}">
        <td style="padding:5px 10px;color:#777;font-size:.68rem">${r.actividad}</td>
        <td style="padding:5px 10px;color:#333">${r.desc||'—'}</td>
        <td style="padding:5px 6px;text-align:right;color:#888">${r.cant_ha>0?Fn(r.cant_ha)+' '+(r.um||''):''}</td>
        <td style="padding:5px 6px;text-align:right;font-weight:700;color:#1b5e20">${Fv(cph)}</td>
        <td style="padding:5px 6px;text-align:right;color:#888">${pct_row.toFixed(1)}%</td>
        <td style="padding:5px 6px;text-align:right;color:#aaa">—</td>
        <td style="padding:5px 6px;text-align:right"></td>
      </tr>`;
      rowIdx++;
    });

    // Subtotal row if rows exist
    if(rows.length>0){
      const catRealHa=catTotal/ha;
      const var_ha=catRealHa-pptoC_ha;
      const varColor=var_ha>0?'#c62828':'#2e7d32';
      h+=`<tr style="background:#f9fbe7;font-weight:700">
        <td colspan="3" style="padding:5px 10px;font-size:.68rem;color:#555">Subtotal ${cat}</td>
        <td style="padding:5px 6px;text-align:right;color:#1b5e20">${Fv(catRealHa)}</td>
        <td style="padding:5px 6px;text-align:right;color:#555">${totalReal>0?(catTotal/totalReal*100).toFixed(1)+'%':''}</td>
        <td style="padding:5px 6px;text-align:right;color:#555">${pptoC>0?Fv(pptoC_ha):'—'}</td>
        <td style="padding:5px 6px;text-align:right;color:${varColor}">${pptoC>0?(var_ha>0?'+':'')+Fv(var_ha):'—'}</td>
      </tr>`;
    }
  });

  // ── GRAN TOTAL ──
  const varTotal=totalRealHa-pptoHa;
  const varColor=varTotal>0?'#c62828':'#2e7d32';
  const varPct=pptoHa>0?(varTotal/pptoHa*100):0;
  h+=`</tbody><tfoot>
    <tr style="background:#1b5e20;color:#fff;font-weight:800;font-size:.82rem">
      <td colspan="3" style="padding:10px 10px;border-radius:0 0 0 6px">TOTAL GENERAL — ${Fn(ha)} ha</td>
      <td style="padding:10px 6px;text-align:right">${Fv(totalRealHa)}</td>
      <td style="padding:10px 6px;text-align:right">${pct}%</td>
      <td style="padding:10px 6px;text-align:right">${Fv(pptoHa)}</td>
      <td style="padding:10px 6px;text-align:right;border-radius:0 0 6px 0;color:${varTotal>0?'#ff8a80':'#b9f6ca'}">${(varTotal>0?'+':'')+Fv(varTotal)} (${varPct>0?'+':''}${varPct.toFixed(1)}%)</td>
    </tr>
  </tfoot></table>`;

  document.getElementById('cost-report-lote').textContent=loteName;
  document.getElementById('cost-report-body').innerHTML=h;
  document.getElementById('cost-report-bg').style.display='flex';
}
function cerrarCostReport(){document.getElementById('cost-report-bg').style.display='none';}

/* ── BITÁCORA COMPLETA ── */
function abrirBitacoraCompleta(){
  const all=loadStatus();
  const ST_LBL={ok:'✅ Hecho',par:'⚠️ Parcial',no:'❌ No hecho'};
  const ST_CLS={ok:'ok',par:'par',no:'no'};
  const TIPO_LBL={real:'⬛ Aplicado',mo:'👷 Mano de obra',maq:'🚜 Maquinaria',ppto:'📋 Presupuestado',siembra:'🌱 Siembra'};

  const entries=Object.entries(all)
    .filter(([k,v])=>v.status||v.note)
    .map(([k,v])=>{
      const parts=k.split('|');
      const tipo=parts[0];
      // siembra key: siembra|FECHA|lotes   — others: tipo|lote|fecha_or_dds|...
      const lote=tipo==='siembra'?(parts[2]||'').split(',').join(', '):(parts[1]||'');
      const fecha=tipo==='siembra'?(parts[1]||''):(parts[2]||'');
      let dateStr='',sortKey='';
      if(tipo==='siembra'||tipo==='real'||tipo==='mo'||tipo==='maq'){
        const d=new Date(fecha+'T12:00:00');
        dateStr=isNaN(d)?fecha:d.toLocaleDateString('es-PE',{day:'2-digit',month:'long',year:'numeric'});
        sortKey=fecha;
      } else {
        dateStr='DDS '+fecha;
        sortKey='Z'+fecha.padStart(5,'0');
      }
      return {tipo,lote,dateStr,sortKey,status:v.status,note:v.note,cls:ST_CLS[v.status]||'note'};
    })
    .sort((a,b)=>b.sortKey.localeCompare(a.sortKey)); // más reciente primero

  let body='';
  if(!entries.length){
    body='<div style="text-align:center;color:#aaa;padding:40px;font-size:.9rem">Sin comentarios aún.<br>Abre un evento en el calendario y escribe tu nota.</div>';
  } else {
    entries.forEach(e=>{
      body+='<div class="bitlog-row '+(e.cls)+'">'
        +'<div style="display:flex;align-items:baseline;gap:4px">'
        +'<span class="bitlog-lote">'+e.lote+'</span>'
        +'<span class="bitlog-fecha">— '+e.dateStr+'</span>'
        +'</div>'
        +'<div class="bitlog-tipo">'+(TIPO_LBL[e.tipo]||e.tipo)+(e.status?' · <strong>'+ST_LBL[e.status]+'</strong>':'')+'</div>'
        +(e.note?'<div class="bitlog-note">'+e.note+'</div>':'')
        +'</div>';
    });
  }

  document.getElementById('bitlog-count').textContent=entries.length+' comentario'+(entries.length!==1?'s':'');
  document.getElementById('bitlog-body').innerHTML=body;
  document.getElementById('bitlog-bg').style.display='flex';
}
function cerrarBitacoraCompleta(){document.getElementById('bitlog-bg').style.display='none';}
</script>
